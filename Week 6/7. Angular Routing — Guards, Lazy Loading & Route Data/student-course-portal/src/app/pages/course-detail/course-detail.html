<div *ngIf="course" class="course-detail">
  <h2 class="course-name">{{ course.name }}</h2>
  <p class="course-id"><strong>ID:</strong> {{ course.id }}</p>
  <p class="course-code"><strong>Code:</strong> {{ course.code }}</p>
  <p class="course-credits"><strong>Credits:</strong> {{ course.credits }}</p>
  <p class="course-status"><strong>Status:</strong> {{ course.gradeStatus }}</p>
</div>
